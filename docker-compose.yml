version: "3.9"

services:
  swarm:
    build: .
    env_file: .env
    volumes:
      # Mount outputs and config so changes persist on host
      - ./Drafts:/app/Drafts
      - ./agents:/app/agents
      - ./swarm_config.yml:/app/swarm_config.yml
      - ./Knowledge_Traceability_Matrix.md:/app/Knowledge_Traceability_Matrix.md
    # Override CMD to execute a research task
    # Usage: docker compose run swarm execute "Your prompt here"
    command: ["info"]
