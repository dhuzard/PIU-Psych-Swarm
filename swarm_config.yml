# ═══════════════════════════════════════════════════════════════
# swarm_config.yml — THE user-facing control surface
# ═══════════════════════════════════════════════════════════════
# This file defines EVERYTHING about your research swarm:
# personas, tools, LLM backend, reviewer constraints, and prompts.
# Fork this repo → edit this file → run your own domain-specific swarm.
# You should NEVER need to edit Python code to customize behavior.
# ═══════════════════════════════════════════════════════════════

# ── Swarm Identity ───────────────────────────────────
swarm:
  name: "PIU-Psych-Squad"
  description: "Autonomous Research Swarm for psychiatric study of problematic internet use"
  output_dir: "./Drafts"
  traceability_matrix: "./Knowledge_Traceability_Matrix.md"

# ── Orchestrator Settings ────────────────────────────
# Controls the multi-agent supervisor pattern.
# agent:     persona name that acts as orchestrator (must exist in personas list)
# journalist: persona name that writes final structured output
# max_agent_calls:          total specialist invocations before forcing Journalist
# max_tool_rounds_per_agent: tool-use loop limit inside each specialist call
orchestrator:
  agent: "Dr. Nexus"
  journalist: "Journalist"
  max_agent_calls: 8
  max_tool_rounds_per_agent: 5

# ── LLM Backend ─────────────────────────────────────
# Supported providers: openai, anthropic, google
model:
  provider: "openai"
  name: "gpt-4o"
  temperature: 0.2
  env_key: "OPENAI_API_KEY"

# ── Personas ─────────────────────────────────────────
# Each persona has a name, icon, role description, a persona file
# loaded at runtime (the persona.md in agents/), and a list of
# tool keys (from the tools section below) they are allowed to use.
personas:
  - name: "Dr. Nexus"
    icon: "👑"
    role: "Orchestrator & Synthesizer"
    persona_file: "./agents/DrNexus/persona.md"
    tools:
      - search_web
      - search_literature
      - search_kb
      - append_traceability

  - name: "ClinicalPsych"
    icon: "🧠"
    role: "Clinical psychiatrist for diagnosis, impairment, and comorbidity"
    persona_file: "./agents/ClinicalPsych/persona.md"
    tools:
      - search_literature
      - search_preprints
      - search_web
      - search_kb
      - scrape_page
      - you_research

  - name: "EpiScope"
    icon: "📊"
    role: "Epidemiologist and psychometrics reviewer"
    persona_file: "./agents/EpiScope/persona.md"
    tools:
      - search_literature
      - search_preprints
      - search_web
      - search_kb
      - scrape_page
      - you_research

  - name: "NeuroCogs"
    icon: "🧪"
    role: "Mechanisms and neurocognition specialist"
    persona_file: "./agents/NeuroCogs/persona.md"
    tools:
      - search_literature
      - search_preprints
      - search_web
      - search_kb
      - scrape_page
      - you_research

  - name: "CarePath"
    icon: "🛟"
    role: "Intervention, prevention, and care pathways specialist"
    persona_file: "./agents/CarePath/persona.md"
    tools:
      - search_literature
      - search_preprints
      - search_web
      - search_kb
      - scrape_page
      - you_research

  - name: "Journalist"
    icon: "✍️"
    role: "Observer & Scribe"
    persona_file: "./agents/Journalist/persona.md"
    tools:
      - write_section
      - append_traceability
      - git_snapshot

# ── Tools Registry ───────────────────────────────────
# Map logical tool names to Python module + function.
# To add a custom tool: create a Python function decorated
# with @tool, then register it here.
tools:
  search_literature:
    module: "automation.tools"
    function: "search_pubmed"
    description: "Search PubMed for peer-reviewed biomedical literature"

  search_web:
    module: "automation.tools"
    function: "search_you_engine"
    description: "Search the live web via You.com API"

  check_schema_org:
    module: "automation.tools"
    function: "check_schema_org"
    description: "Validate terms against the Schema.org vocabulary"

  write_section:
    module: "automation.tools"
    function: "write_manuscript_section"
    description: "Write a drafted section to disk as Markdown"

  append_traceability:
    module: "automation.tools"
    function: "append_traceability_matrix"
    description: "Log a fact and its source to the Knowledge Traceability Matrix"

  search_kb:
    module: "automation.tools"
    function: "search_knowledge_base"
    description: "Search the local vectorized Knowledge Base documents"

  scrape_page:
    module: "automation.tools"
    function: "scrape_webpage"
    description: "Fetch and extract full text content from a URL"

  search_preprints:
    module: "automation.tools"
    function: "search_semantic_scholar"
    description: "Search Semantic Scholar for preprints, CHI papers, and recent publications not yet on PubMed"

  you_research:
    module: "automation.tools"
    function: "you_research"
    description: "You.com Research API: multi-step web synthesis with inline citations for a specific sub-question"

  git_snapshot:
    module: "automation.tools"
    function: "git_commit_snapshot"
    description: "Commit swarm output files (Drafts/ and traceability matrix) to git"

# ── Reviewer-2 (Adversarial Checkpoint) ──────────────
# The Reviewer gates all final outputs. Customize its
# constraints for your domain.
reviewer:
  enabled: true
  max_revision_loops: 3

  # Words that trigger automatic rejection
  banned_words:
    - "groundbreaking"
    - "revolutionary"
    - "game-changing"
    - "paradigm-shifting"
    - "unprecedented"

  # Structural elements the output MUST contain
  required_elements:
    - "a section that distinguishes high engagement from clinically impairing use"
    - "a short limitations section"
    - "in-text citations (e.g., [1], [2])"
    - "a formal 'References' or 'Reference List' section at the bottom"
    - "when discussing AI-chatbot or LLM use, a note on the conceptual instability of the construct and whether evidence meets clinical-level impairment criteria"

  # Tone enforcement
  tone: "strictly factual, objective, and neutral"

  # Optional: use a dedicated model for Reviewer-2 to create adversarial diversity.
  # Merges on top of the main model config — only override what differs.
  # Higher temperature (0.7–0.9) makes the reviewer more likely to find flaws.
  # If omitted, Reviewer-2 uses the same model as the research agents.
  model:
    name: "gpt-4o"
    temperature: 0.8

  # Optional: Override the auto-generated reviewer prompt entirely.
  # Uncomment and edit to use a fully custom reviewer.
  # custom_prompt: |
  #   You are a financial compliance reviewer. You read the agent's output.
  #   If the output contains forward-looking statements without disclaimers,
  #   or if projections are not clearly labeled as estimates, REJECT it.

# ── Epistemic Tags ───────────────────────────────────
# Tags used to classify knowledge claims in the traceability matrix.
# Customize these to fit your domain's epistemology.
epistemic_tags:
  - "[FACT]"
  - "[INFERENCE]"
  - "[SPECULATION]"

# ── System Prompt Template (LEGACY — NOT USED) ──────
# This template was used by the old single-agent architecture.
# In the current multi-agent supervisor pattern, each agent node
# builds its own prompt from its persona.md via build_agent_system_prompt().
# This block has no effect at runtime and is kept only for reference.
# See automation/config.py: build_agent_system_prompt()
system_prompt_template: |
  You are the {{ swarm.name }}, an orchestration of specialist agents:
  {%- for p in personas %}
  - {{ p.icon }} **{{ p.name }}** ({{ p.role }}){% if p.content %}
    {{ p.content }}{% endif %}
  {%- endfor %}

  DOMAIN DIRECTIVE: The target topic is psychiatric and behavioral-science research on
  problematic internet use (PIU), including internet gaming disorder when relevant.
  You must distinguish between normal/high engagement and clinically impairing use.
  Do not imply that all frequent internet use is pathological.

  DIAGNOSTIC DIRECTIVE: When discussing diagnosis, clarify whether a construct is
  formally recognized (for example, gaming disorder in ICD-11 and internet gaming
  disorder in DSM-5's section for conditions requiring further study) versus broader
  umbrella constructs such as problematic internet use or internet addiction.

  CRITICAL DIRECTIVE: Whenever you search the web or literature for facts,
  you MUST immediately call the 'append_traceability_matrix' tool to log
  your findings using a strict epistemic tag from: {{ epistemic_tags | join(', ') }}
  before you proceed to answering.

  MANDATORY FORMATTING: When generating your final structured response or
  writing to disk, you MUST include formal academic in-text citations
  (e.g., [1], [2]) and a complete formal 'References' section at the bottom
  containing the extracted URLs or PMIDs.

  You have tools to search literature, validate schemas, search the live web,
  search your local knowledge base, scrape full web pages, log traceability
  matrices, write draft sections to disk, and commit snapshots to git.
  Use your tools to fulfill the user request precisely.
