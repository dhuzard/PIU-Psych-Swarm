# ═══════════════════════════════════════════════════════
# swarm_config.yml — Financial Modeling Domain Example
# ═══════════════════════════════════════════════════════

swarm:
  name: "FinanceSwarm"
  description: "Multi-agent financial research and risk analysis system"
  output_dir: "./Drafts"
  traceability_matrix: "./Knowledge_Traceability_Matrix.md"

model:
  provider: "openai"
  name: "gpt-4o"
  temperature: 0.1
  env_key: "OPENAI_API_KEY"

personas:
  - name: "Chief Analyst"
    icon: "📈"
    role: "Orchestrator & Strategy Lead"
    persona_file: "./agents/ChiefAnalyst/persona.md"
    tools: [search_web, search_kb, append_traceability]

  - name: "Quant Researcher"
    icon: "🧮"
    role: "Quantitative Analysis & Model Validation"
    persona_file: "./agents/QuantResearcher/persona.md"
    tools: [search_web, search_kb, scrape_page]

  - name: "Compliance Officer"
    icon: "🛡️"
    role: "Regulatory & Risk Compliance"
    persona_file: "./agents/ComplianceOfficer/persona.md"
    tools: [search_web, search_kb]

  - name: "Report Writer"
    icon: "✍️"
    role: "Neutral Analyst & Report Assembler"
    persona_file: "./agents/ReportWriter/persona.md"
    tools: [write_section, append_traceability]

tools:
  search_web:
    module: "automation.tools"
    function: "search_you_engine"
    description: "Search for market news, SEC filings, and regulatory updates"

  search_kb:
    module: "automation.tools"
    function: "search_knowledge_base"
    description: "Search local financial reports and internal research"

  scrape_page:
    module: "automation.tools"
    function: "scrape_webpage"
    description: "Fetch full content from SEC EDGAR, central bank pages, etc."

  write_section:
    module: "automation.tools"
    function: "write_manuscript_section"
    description: "Write a section of the financial report to disk"

  append_traceability:
    module: "automation.tools"
    function: "append_traceability_matrix"
    description: "Log a financial finding to the audit trail"

reviewer:
  enabled: true
  max_revision_loops: 3
  banned_words:
    - "guaranteed returns"
    - "risk-free"
    - "sure thing"
    - "can't lose"
    - "moon"
    - "rocket"
  required_elements:
    - "data source citations with dates"
    - "a Risk Disclaimer section"
  tone: "conservative, hedged financial analysis with appropriate caveats"

epistemic_tags:
  - "[MARKET_DATA]"
  - "[ESTIMATE]"
  - "[PROJECTION]"
  - "[REGULATION]"

system_prompt_template: |
  You are {{ swarm.name }}, a multi-agent financial analysis system:
  {%- for p in personas %}
  - {{ p.icon }} **{{ p.name }}** ({{ p.role }})
  {%- endfor %}

  DIRECTIVE: After every search, log findings with epistemic tags:
  {{ epistemic_tags | join(', ') }}.
  All projections MUST be labeled as estimates, not facts.

  FORMATTING: Include dated data source citations. Every report MUST
  end with a Risk Disclaimer section.

  Use your tools to fulfill the research request precisely.
