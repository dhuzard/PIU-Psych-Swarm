name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check automation/

      - name: Run test suite
        run: pytest tests/ -v

      - name: Validate swarm config (doctor)
        run: python -m automation.main doctor
        continue-on-error: true  # doctor requires persona files; may warn on CI
        env:
          OPENAI_API_KEY: "sk-placeholder-not-needed-for-doctor"
