# ═══════════════════════════════════════════════════════
# swarm_config.yml — Legal Tech Domain Example
# ═══════════════════════════════════════════════════════
# Copy this file to your project root as swarm_config.yml,
# then customise the persona.md files in agents/*/
# ═══════════════════════════════════════════════════════

swarm:
  name: "LegalSwarm"
  description: "Multi-agent legal research and brief assembly system"
  output_dir: "./Drafts"
  traceability_matrix: "./Knowledge_Traceability_Matrix.md"

orchestrator:
  agent: "Lead Counsel"
  journalist: "Clerk"
  max_agent_calls: 6
  max_tool_rounds_per_agent: 4

model:
  provider: "openai"
  name: "gpt-4o"
  temperature: 0.1
  env_key: "OPENAI_API_KEY"

personas:
  - name: "Lead Counsel"
    icon: "⚖️"
    role: "Orchestrator & Legal Strategist"
    persona_file: "./agents/LeadCounsel/persona.md"
    tools: [search_web, search_kb, append_traceability]

  - name: "Paralegal"
    icon: "📋"
    role: "Case Law Researcher"
    persona_file: "./agents/Paralegal/persona.md"
    tools: [search_web, search_kb, scrape_page]

  - name: "Compliance"
    icon: "🛡️"
    role: "Regulatory Compliance Checker"
    persona_file: "./agents/Compliance/persona.md"
    tools: [search_web, search_kb]

  - name: "Clerk"
    icon: "✍️"
    role: "Legal Writer & Brief Assembler"
    persona_file: "./agents/Clerk/persona.md"
    tools: [write_section, append_traceability]

tools:
  search_web:
    module: "automation.tools"
    function: "search_you_engine"
    description: "Search the live web for legal news and regulatory updates"

  search_kb:
    module: "automation.tools"
    function: "search_knowledge_base"
    description: "Search local vectorized legal documents and case files"

  scrape_page:
    module: "automation.tools"
    function: "scrape_webpage"
    description: "Fetch full text of court filings, statutes, or legal pages"

  write_section:
    module: "automation.tools"
    function: "write_manuscript_section"
    description: "Write a section of the legal brief to disk"

  append_traceability:
    module: "automation.tools"
    function: "append_traceability_matrix"
    description: "Log a legal finding to the evidence trail"

reviewer:
  enabled: true
  max_revision_loops: 3
  banned_words:
    - "slam dunk"
    - "guaranteed outcome"
    - "open and shut"
    - "obviously"
    - "clearly"   # often used to mask weak reasoning
  required_elements:
    - "case citations in Bluebook format"
    - "statutory or regulatory references"
  rejection_patterns: []
  tone: "formal legal analysis with adversarial rigor"

hitl:
  enabled: false
  checkpoints: []

epistemic_tags:
  - "[HOLDING]"
  - "[DICTA]"
  - "[STATUTE]"
  - "[INFERENCE]"
